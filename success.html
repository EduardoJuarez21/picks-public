<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago exitoso — Pickster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; color: #f5c842; margin-bottom: 12px; }
    p { color: #aaa; line-height: 1.6; margin-bottom: 10px; }
    .highlight { color: #fff; font-weight: 600; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: #229ed9;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn:hover { background: #1a8bbf; }
    .back { display: block; margin-top: 16px; color: #555; font-size: 0.85rem; text-decoration: none; }
    .back:hover { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Pago confirmado</h1>
    <p>Tu suscripción <span class="highlight">Pickster VIP</span> está activa.</p>
    <p>Revisa tu Telegram — te enviamos el link de acceso al canal privado en este momento.</p>
    <p style="margin-top:16px; font-size:0.85rem; color:#666;">Si no recibiste el mensaje, escríbele directamente al bot.</p>
    <a href="https://t.me/PicksterV_bot" class="btn">Abrir bot en Telegram</a>
    <a href="/" class="back">Volver al inicio</a>
  </div>
</body>
</html>
